<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pitch Bird!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Comic Sans MS', 'Chalkboard', cursive, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        #gameContainer {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        h1 {
            color: #FFD700;
            text-shadow: 3px 3px 0 #B8860B, -1px -1px 0 #FFF8DC;
            font-size: 28px;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        #gameCanvas {
            border-radius: 20px;
            box-shadow:
                0 10px 40px rgba(0, 0, 0, 0.3),
                0 0 0 5px #FFD700,
                0 0 0 10px #B8860B,
                0 0 30px rgba(255, 215, 0, 0.4);
            touch-action: none;
        }

        #pitchIndicator {
            width: 100%;
            max-width: 500px;
            height: 25px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            border: 3px solid #FFD700;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
        }

        #pitchBar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #FF6B6B, #FFE66D, #4ECDC4);
            border-radius: 12px;
            transition: width 0.05s ease-out;
        }

        #pitchText {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #333;
            font-size: 12px;
            font-weight: bold;
            text-shadow: 0 1px 0 white;
        }

        #micStatus {
            color: white;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            padding: 8px 16px;
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            transition: all 0.2s;
        }

        #micStatus:hover {
            background: rgba(255,255,255,0.25);
            transform: scale(1.05);
        }

        #micStatus.active {
            color: #90EE90;
            background: rgba(0,255,0,0.15);
        }

        #micStatus.error {
            color: #FFB6C1;
            background: rgba(255,0,0,0.15);
        }

        .mic-icon {
            width: 18px;
            height: 18px;
            display: inline-block;
        }

        #instructions {
            color: white;
            text-align: center;
            max-width: 400px;
            font-size: 14px;
            line-height: 1.6;
            margin-top: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            background: rgba(255,255,255,0.1);
            padding: 12px 20px;
            border-radius: 15px;
        }

        #stats {
            display: flex;
            gap: 15px;
            color: white;
            font-size: 14px;
            margin-top: 5px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255,255,255,0.15);
            padding: 8px 15px;
            border-radius: 12px;
            min-width: 70px;
        }

        .stat-value {
            font-size: 22px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 1px 1px 0 #B8860B;
        }

        .stat-label {
            font-size: 10px;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (max-height: 750px) {
            #instructions {
                display: none;
            }
            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <h1>PITCH BIRD!</h1>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="pitchIndicator">
            <div id="pitchBar"></div>
            <span id="pitchText">-- Hz</span>
        </div>
        <div id="micStatus">
            <svg class="mic-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/>
            </svg>
            <span id="micStatusText">Tap to enable microphone!</span>
        </div>
        <div id="stats">
            <div class="stat">
                <span class="stat-value" id="scoreValue">0</span>
                <span class="stat-label">Score</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="comboValue">0</span>
                <span class="stat-label">Combo</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="accuracyValue">0%</span>
                <span class="stat-label">Accuracy</span>
            </div>
        </div>
        <div id="instructions">
            Sing to fly the note-bird and gobble up gold coins!<br>
            Match the pitch shown on each coin for bonus points!
        </div>
    </div>

    <script>
        // =============================================================================
        // MUSICAL NOTE DEFINITIONS - Standard A4 = 440 Hz tuning
        // =============================================================================

        const NOTES = {
            'E2': 82.41, 'F2': 87.31, 'G2': 98.00, 'A2': 110.00, 'B2': 123.47,
            'C3': 130.81, 'D3': 146.83, 'E3': 164.81, 'F3': 174.61,
            'G3': 196.00, 'A3': 220.00, 'B3': 246.94,
            'C4': 261.63, 'D4': 293.66, 'E4': 329.63, 'F4': 349.23,
            'G4': 392.00, 'A4': 440.00, 'B4': 493.88,
            'C5': 523.25, 'D5': 587.33, 'E5': 659.25, 'F5': 698.46,
            'G5': 783.99, 'A5': 880.00
        };

        // Treble Clef positions (E4 = position 0, bottom line of staff)
        const STAFF_POS = {
            'C3': -8, 'D3': -7, 'E3': -6, 'F3': -5,
            'G3': -4, 'A3': -3, 'B3': -2,
            'C4': -2, 'D4': -1,
            'E4': 0, 'F4': 1, 'G4': 2, 'A4': 3, 'B4': 4,
            'C5': 5, 'D5': 6, 'E5': 7, 'F5': 8,
            'G5': 9, 'A5': 10, 'B5': 11, 'C6': 12
        };

        // =============================================================================
        // TUNABLE CONSTANTS
        // =============================================================================

        const CONFIG = {
            FFT_SIZE: 2048,
            SILENCE_THRESHOLD: 0.01,
            MIN_CLARITY: 0.75,
            MIN_PITCH: 80,
            MAX_PITCH: 600,
            MOVING_AVG_WINDOW: 7,
            LOW_PASS_ALPHA: 0.3,
            PITCH_SMOOTHING: 0.2,

            NOTE_SPEED: 1,
            NOTE_SPAWN_INTERVAL: 150,
            BIRD_X: 100,

            PERFECT_THRESHOLD: 15,
            GREAT_THRESHOLD: 30,
            GOOD_THRESHOLD: 50,
            PERFECT_SCORE: 100,
            GREAT_SCORE: 75,
            GOOD_SCORE: 50,
            OK_SCORE: 25,

            // Increased line spacing for better proportions
            STAFF_LINE_SPACING: 20,
            COIN_RADIUS: 18,
            BIRD_SIZE: 20,

            GAME_NOTES: ['G3', 'A3', 'B3', 'C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4', 'C5', 'D5', 'E5'],
        };

        // =============================================================================
        // GAME STATE
        // =============================================================================

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const pitchBar = document.getElementById('pitchBar');
        const pitchText = document.getElementById('pitchText');
        const micStatus = document.getElementById('micStatus');
        const micStatusText = document.getElementById('micStatusText');
        const scoreValue = document.getElementById('scoreValue');
        const comboValue = document.getElementById('comboValue');
        const accuracyValue = document.getElementById('accuracyValue');

        let gameState = 'waiting';
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let notesHit = 0;
        let notesMissed = 0;
        let totalNotes = 0;
        let frameCount = 0;

        let coins = [];
        let scorePopups = [];
        let flyingCoins = []; // Coins flying to pot
        let sparkles = []; // Fun sparkle effects
        let potCoins = 0; // Coins in the pot

        let audioContext = null;
        let analyser = null;
        let micStream = null;
        let audioBuffer = null;
        let isAudioReady = false;
        let currentPitch = 0;
        let smoothedPitch = 0;
        let pitchHistory = [];
        let lastValidPitch = 260;
        let currentNote = null;

        let bird = { x: CONFIG.BIRD_X, y: 0, targetY: 0, rotation: 0 };
        let staffBottomY = 0;

        // Pot of gold position
        let pot = { x: 0, y: 0 };

        // Rainbow colors for effects
        const RAINBOW = ['#FF6B6B', '#FFE66D', '#4ECDC4', '#45B7D1', '#96E6A1', '#DDA0DD'];

        // =============================================================================
        // CANVAS SETUP
        // =============================================================================

        function resizeCanvas() {
            const maxWidth = Math.min(550, window.innerWidth - 40);
            const maxHeight = Math.min(400, window.innerHeight - 350);

            canvas.width = maxWidth;
            canvas.height = Math.max(280, maxHeight);

            staffBottomY = canvas.height / 2 + 2 * CONFIG.STAFF_LINE_SPACING;
            bird.y = staffBottomY - 2 * CONFIG.STAFF_LINE_SPACING;
            bird.targetY = bird.y;

            // Position pot of gold in bottom right
            pot.x = canvas.width - 50;
            pot.y = canvas.height - 45;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // =============================================================================
        // MUSICAL UTILITIES
        // =============================================================================

        function getStaffY(staffPos) {
            return staffBottomY - (staffPos * CONFIG.STAFF_LINE_SPACING / 2);
        }

        function getNoteY(noteName) {
            const staffPos = STAFF_POS[noteName];
            if (staffPos === undefined) return staffBottomY;
            return getStaffY(staffPos);
        }

        function frequencyToNote(frequency) {
            if (frequency <= 0) return null;
            let closestNote = null;
            let closestDiff = Infinity;
            let closestFreq = 0;

            for (const [note, freq] of Object.entries(NOTES)) {
                const diff = Math.abs(frequency - freq);
                if (diff < closestDiff) {
                    closestDiff = diff;
                    closestNote = note;
                    closestFreq = freq;
                }
            }

            return {
                note: closestNote,
                cents: Math.round(1200 * Math.log2(frequency / closestFreq)),
                frequency: closestFreq
            };
        }

        function getFrequencyY(frequency) {
            const minFreq = NOTES[CONFIG.GAME_NOTES[0]];
            const maxFreq = NOTES[CONFIG.GAME_NOTES[CONFIG.GAME_NOTES.length - 1]];
            const clampedFreq = Math.max(minFreq * 0.9, Math.min(maxFreq * 1.1, frequency));

            const logMin = Math.log2(minFreq);
            const logMax = Math.log2(maxFreq);
            const ratio = (Math.log2(clampedFreq) - logMin) / (logMax - logMin);

            const topY = getNoteY(CONFIG.GAME_NOTES[CONFIG.GAME_NOTES.length - 1]) - CONFIG.STAFF_LINE_SPACING;
            const bottomY = getNoteY(CONFIG.GAME_NOTES[0]) + CONFIG.STAFF_LINE_SPACING;

            return bottomY - ratio * (bottomY - topY);
        }

        // =============================================================================
        // AUDIO PROCESSING
        // =============================================================================

        async function initAudio() {
            try {
                micStatusText.textContent = 'Requesting microphone...';
                micStatus.className = '';

                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                micStream = await navigator.mediaDevices.getUserMedia({
                    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
                });

                analyser = audioContext.createAnalyser();
                analyser.fftSize = CONFIG.FFT_SIZE;
                analyser.smoothingTimeConstant = 0;

                const source = audioContext.createMediaStreamSource(micStream);
                source.connect(analyser);
                audioBuffer = new Float32Array(analyser.fftSize);

                isAudioReady = true;
                micStatusText.textContent = 'Microphone ready - Sing to fly!';
                micStatus.className = 'active';
                processAudio();

            } catch (error) {
                micStatusText.textContent = error.name === 'NotAllowedError'
                    ? 'Microphone permission denied'
                    : 'Microphone error: ' + error.message;
                micStatus.className = 'error';
                isAudioReady = false;
            }
        }

        function applyMovingAverage(pitch) {
            pitchHistory.push(pitch);
            if (pitchHistory.length > CONFIG.MOVING_AVG_WINDOW) pitchHistory.shift();
            return pitchHistory.reduce((a, b) => a + b, 0) / pitchHistory.length;
        }

        function detectPitchAutocorrelation(buffer, sampleRate) {
            const bufferSize = buffer.length;
            const filteredBuffer = new Float32Array(bufferSize);
            filteredBuffer[0] = buffer[0];

            for (let i = 1; i < bufferSize; i++) {
                filteredBuffer[i] = CONFIG.LOW_PASS_ALPHA * buffer[i] +
                                   (1 - CONFIG.LOW_PASS_ALPHA) * filteredBuffer[i - 1];
            }

            let sum = 0, rms = 0;
            for (let i = 0; i < bufferSize; i++) {
                sum += filteredBuffer[i];
                rms += filteredBuffer[i] * filteredBuffer[i];
            }
            const mean = sum / bufferSize;
            rms = Math.sqrt(rms / bufferSize);

            if (rms < CONFIG.SILENCE_THRESHOLD) return { pitch: 0, clarity: 0 };

            for (let i = 0; i < bufferSize; i++) filteredBuffer[i] -= mean;

            const minLag = Math.floor(sampleRate / CONFIG.MAX_PITCH);
            const maxLag = Math.ceil(sampleRate / CONFIG.MIN_PITCH);
            let bestLag = 0, bestCorrelation = -1;

            for (let lag = minLag; lag <= maxLag && lag < bufferSize / 2; lag++) {
                let correlation = 0, norm1 = 0, norm2 = 0;
                for (let i = 0; i < bufferSize - lag; i++) {
                    correlation += filteredBuffer[i] * filteredBuffer[i + lag];
                    norm1 += filteredBuffer[i] * filteredBuffer[i];
                    norm2 += filteredBuffer[i + lag] * filteredBuffer[i + lag];
                }
                const normFactor = Math.sqrt(norm1 * norm2);
                if (normFactor > 0) correlation /= normFactor;
                if (correlation > bestCorrelation) {
                    bestCorrelation = correlation;
                    bestLag = lag;
                }
            }

            return { pitch: sampleRate / bestLag, clarity: bestCorrelation };
        }

        function processAudio() {
            if (!isAudioReady) return;

            analyser.getFloatTimeDomainData(audioBuffer);
            const result = detectPitchAutocorrelation(audioBuffer, audioContext.sampleRate);

            if (result.clarity > CONFIG.MIN_CLARITY && result.pitch > 0) {
                currentPitch = applyMovingAverage(result.pitch);
                lastValidPitch = currentPitch;
                currentNote = frequencyToNote(currentPitch);
                updatePitchUI(currentPitch);
            } else {
                currentPitch = 0;
                currentNote = null;
            }

            if (currentPitch > 0) {
                smoothedPitch = smoothedPitch + (currentPitch - smoothedPitch) * CONFIG.PITCH_SMOOTHING;
            }

            requestAnimationFrame(processAudio);
        }

        function updatePitchUI(pitch) {
            const noteInfo = frequencyToNote(pitch);
            if (noteInfo) {
                const minFreq = NOTES[CONFIG.GAME_NOTES[0]];
                const maxFreq = NOTES[CONFIG.GAME_NOTES[CONFIG.GAME_NOTES.length - 1]];
                const logMin = Math.log2(minFreq);
                const logMax = Math.log2(maxFreq);
                const logPitch = Math.log2(Math.max(minFreq, Math.min(maxFreq, pitch)));
                const percentage = ((logPitch - logMin) / (logMax - logMin)) * 100;

                pitchBar.style.width = percentage + '%';
                pitchText.textContent = `${noteInfo.note} (${Math.round(pitch)} Hz)`;
            }
        }

        // =============================================================================
        // GAME LOGIC
        // =============================================================================

        function resetGame() {
            score = 0;
            combo = 0;
            maxCombo = 0;
            notesHit = 0;
            notesMissed = 0;
            totalNotes = 0;
            frameCount = 0;
            coins = [];
            scorePopups = [];
            flyingCoins = [];
            sparkles = [];
            potCoins = 0;
            updateStatsUI();
        }

        function startGame() {
            if (!isAudioReady) {
                initAudio();
                return;
            }
            if (gameState === 'waiting') {
                resetGame();
                gameState = 'playing';
            }
        }

        function spawnCoin() {
            const noteName = CONFIG.GAME_NOTES[Math.floor(Math.random() * CONFIG.GAME_NOTES.length)];
            coins.push({
                x: canvas.width + CONFIG.COIN_RADIUS,
                noteName: noteName,
                frequency: NOTES[noteName],
                y: getNoteY(noteName),
                collected: false,
                result: null,
                opacity: 1,
                wobble: Math.random() * Math.PI * 2
            });
        }

        function addSparkles(x, y, color, count = 8) {
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
                sparkles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * (2 + Math.random() * 3),
                    vy: Math.sin(angle) * (2 + Math.random() * 3),
                    color: color || RAINBOW[Math.floor(Math.random() * RAINBOW.length)],
                    life: 1,
                    size: 3 + Math.random() * 4
                });
            }
        }

        function collectCoin(coin) {
            // Calculate pitch accuracy
            let result, points, color;

            if (currentPitch > 0) {
                const centsDiff = Math.abs(1200 * Math.log2(currentPitch / coin.frequency));

                if (centsDiff <= CONFIG.PERFECT_THRESHOLD) {
                    result = 'PERFECT!';
                    points = CONFIG.PERFECT_SCORE * (1 + combo * 0.1);
                    color = '#FFD700';
                    combo++;
                    notesHit++;
                } else if (centsDiff <= CONFIG.GREAT_THRESHOLD) {
                    result = 'GREAT!';
                    points = CONFIG.GREAT_SCORE * (1 + combo * 0.1);
                    color = '#4ECDC4';
                    combo++;
                    notesHit++;
                } else if (centsDiff <= CONFIG.GOOD_THRESHOLD) {
                    result = 'GOOD!';
                    points = CONFIG.GOOD_SCORE * (1 + combo * 0.05);
                    color = '#96E6A1';
                    combo++;
                    notesHit++;
                } else {
                    result = 'OK';
                    points = CONFIG.OK_SCORE;
                    color = '#DDA0DD';
                    combo = 0;
                }
            } else {
                // No voice but still collected - small points
                result = 'OK';
                points = CONFIG.OK_SCORE;
                color = '#DDA0DD';
                combo = 0;
            }

            score += points;
            coin.collected = true;
            coin.result = result;
            totalNotes++;
            maxCombo = Math.max(maxCombo, combo);

            // Add flying coin to pot
            flyingCoins.push({
                x: coin.x,
                y: coin.y,
                targetX: pot.x,
                targetY: pot.y,
                progress: 0,
                startX: coin.x,
                startY: coin.y
            });

            // Add sparkles
            addSparkles(coin.x, coin.y, color, 12);

            // Add popup
            scorePopups.push({
                x: coin.x,
                y: coin.y - 25,
                text: result,
                color: color,
                alpha: 1,
                vy: -2,
                scale: 1.5
            });

            updateStatsUI();
        }

        function checkCoinCollection(coin) {
            const dx = bird.x - coin.x;
            const dy = bird.y - coin.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const collectionRadius = CONFIG.COIN_RADIUS + CONFIG.BIRD_SIZE / 2;

            if (distance < collectionRadius && !coin.collected) {
                collectCoin(coin);
            }
        }

        function updateStatsUI() {
            scoreValue.textContent = Math.floor(score);
            comboValue.textContent = combo;
            const accuracy = totalNotes > 0 ? Math.round((notesHit / totalNotes) * 100) : 0;
            accuracyValue.textContent = accuracy + '%';
        }

        function updateGame() {
            if (gameState !== 'playing') return;

            frameCount++;

            // Update bird
            if (isAudioReady && smoothedPitch > 0) {
                bird.targetY = getFrequencyY(smoothedPitch);
            }
            const dy = bird.targetY - bird.y;
            bird.y += dy * 0.15;
            bird.rotation = Math.max(-20, Math.min(20, dy * 2));

            // Spawn coins
            if (frameCount % CONFIG.NOTE_SPAWN_INTERVAL === 0) {
                spawnCoin();
            }

            // Update coins
            for (let i = coins.length - 1; i >= 0; i--) {
                const coin = coins[i];
                coin.x -= CONFIG.NOTE_SPEED;
                coin.wobble += 0.1;

                if (!coin.collected) {
                    checkCoinCollection(coin);
                }

                if (coin.collected) {
                    coin.opacity -= 0.15;
                }

                // Remove coins
                if (coin.x < -CONFIG.COIN_RADIUS * 2 || coin.opacity <= 0) {
                    // Only count as miss if not collected
                    if (!coin.collected) {
                        notesMissed++;
                        totalNotes++;
                        combo = 0;
                        updateStatsUI();

                        scorePopups.push({
                            x: 50,
                            y: coin.y,
                            text: 'MISS',
                            color: '#FF6B6B',
                            alpha: 1,
                            vy: -1,
                            scale: 1
                        });
                    }
                    coins.splice(i, 1);
                }
            }

            // Update flying coins
            for (let i = flyingCoins.length - 1; i >= 0; i--) {
                const fc = flyingCoins[i];
                fc.progress += 0.08;

                // Bezier curve to pot
                const t = fc.progress;
                const controlY = Math.min(fc.startY, fc.targetY) - 100;
                fc.x = (1-t)*(1-t)*fc.startX + 2*(1-t)*t*(fc.startX + 50) + t*t*fc.targetX;
                fc.y = (1-t)*(1-t)*fc.startY + 2*(1-t)*t*controlY + t*t*fc.targetY;

                if (fc.progress >= 1) {
                    flyingCoins.splice(i, 1);
                    potCoins++;
                    addSparkles(pot.x, pot.y - 20, '#FFD700', 6);
                }
            }

            // Update sparkles
            for (let i = sparkles.length - 1; i >= 0; i--) {
                const s = sparkles[i];
                s.x += s.vx;
                s.y += s.vy;
                s.vy += 0.15; // gravity
                s.life -= 0.03;
                if (s.life <= 0) sparkles.splice(i, 1);
            }

            // Update popups
            for (let i = scorePopups.length - 1; i >= 0; i--) {
                const popup = scorePopups[i];
                popup.y += popup.vy;
                popup.alpha -= 0.02;
                popup.scale = Math.max(1, popup.scale - 0.03);
                if (popup.alpha <= 0) scorePopups.splice(i, 1);
            }
        }

        // =============================================================================
        // RENDERING
        // =============================================================================

        function drawBackground() {
            // Fun gradient background
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(0.5, '#98D8C8');
            gradient.addColorStop(1, '#F7DC6F');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw some fun clouds
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            drawCloud(80, 40, 25);
            drawCloud(200, 60, 20);
            drawCloud(350, 35, 30);
            drawCloud(canvas.width - 100, 50, 22);

            // Decorative musical notes floating
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.font = '20px serif';
            const time = frameCount * 0.02;
            ctx.fillText('♪', 30 + Math.sin(time) * 10, 80 + Math.cos(time) * 5);
            ctx.fillText('♫', canvas.width - 60 + Math.cos(time) * 8, 90 + Math.sin(time) * 6);
        }

        function drawCloud(x, y, size) {
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.arc(x + size * 0.8, y - size * 0.3, size * 0.7, 0, Math.PI * 2);
            ctx.arc(x + size * 1.4, y, size * 0.8, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawStaff() {
            // Staff background
            ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
            const staffTop = getStaffY(8) - 15;
            const staffBottom = getStaffY(0) + 15;
            ctx.fillRect(0, staffTop, canvas.width, staffBottom - staffTop);

            // Staff lines with slight color
            ctx.strokeStyle = '#5D5D5D';
            ctx.lineWidth = 2;

            for (let i = 0; i < 5; i++) {
                const y = getStaffY(i * 2);
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // Treble clef
            ctx.font = 'bold 70px serif';
            ctx.fillStyle = '#4A4A4A';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('𝄞', 40, getStaffY(4) + 3);
        }

        function drawLedgerLines(x, staffPos) {
            ctx.strokeStyle = '#5D5D5D';
            ctx.lineWidth = 2;

            if (staffPos < 0) {
                for (let pos = -2; pos >= staffPos; pos -= 2) {
                    const y = getStaffY(pos);
                    ctx.beginPath();
                    ctx.moveTo(x - CONFIG.COIN_RADIUS - 8, y);
                    ctx.lineTo(x + CONFIG.COIN_RADIUS + 8, y);
                    ctx.stroke();
                }
            }

            if (staffPos > 8) {
                for (let pos = 10; pos <= staffPos; pos += 2) {
                    const y = getStaffY(pos);
                    ctx.beginPath();
                    ctx.moveTo(x - CONFIG.COIN_RADIUS - 8, y);
                    ctx.lineTo(x + CONFIG.COIN_RADIUS + 8, y);
                    ctx.stroke();
                }
            }
        }

        function drawCoin(coin) {
            const { x, y, noteName, collected, opacity, wobble } = coin;
            const staffPos = STAFF_POS[noteName];

            ctx.save();
            ctx.globalAlpha = opacity;

            drawLedgerLines(x, staffPos);

            // Wobble effect
            const wobbleOffset = Math.sin(wobble) * 2;

            // Coin shadow
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.beginPath();
            ctx.ellipse(x + 3, y + wobbleOffset + 5, CONFIG.COIN_RADIUS, CONFIG.COIN_RADIUS * 0.3, 0, 0, Math.PI * 2);
            ctx.fill();

            // Coin gradient
            const gradient = ctx.createRadialGradient(x - 5, y + wobbleOffset - 5, 0, x, y + wobbleOffset, CONFIG.COIN_RADIUS);
            gradient.addColorStop(0, '#FFF8B0');
            gradient.addColorStop(0.3, '#FFD700');
            gradient.addColorStop(0.7, '#DAA520');
            gradient.addColorStop(1, '#B8860B');

            ctx.beginPath();
            ctx.arc(x, y + wobbleOffset, CONFIG.COIN_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();

            // Coin border
            ctx.strokeStyle = '#8B6914';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Shine
            ctx.beginPath();
            ctx.arc(x - 5, y + wobbleOffset - 5, 5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.fill();

            // Note name
            ctx.fillStyle = '#5D4E37';
            ctx.font = 'bold 11px Comic Sans MS, cursive';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(noteName, x, y + wobbleOffset);

            ctx.restore();
        }

        function drawFlyingCoins() {
            for (const fc of flyingCoins) {
                ctx.save();
                const scale = 1 - fc.progress * 0.5;
                ctx.globalAlpha = 1 - fc.progress * 0.3;

                const gradient = ctx.createRadialGradient(fc.x - 3, fc.y - 3, 0, fc.x, fc.y, CONFIG.COIN_RADIUS * scale);
                gradient.addColorStop(0, '#FFF8B0');
                gradient.addColorStop(0.5, '#FFD700');
                gradient.addColorStop(1, '#B8860B');

                ctx.beginPath();
                ctx.arc(fc.x, fc.y, CONFIG.COIN_RADIUS * scale, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                ctx.restore();
            }
        }

        function drawPotOfGold() {
            const x = pot.x;
            const y = pot.y;

            // Pot shadow
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(x, y + 25, 35, 10, 0, 0, Math.PI * 2);
            ctx.fill();

            // Pot body
            const potGradient = ctx.createLinearGradient(x - 30, y, x + 30, y);
            potGradient.addColorStop(0, '#2C2C2C');
            potGradient.addColorStop(0.3, '#4A4A4A');
            potGradient.addColorStop(0.7, '#3A3A3A');
            potGradient.addColorStop(1, '#1A1A1A');

            ctx.fillStyle = potGradient;
            ctx.beginPath();
            ctx.moveTo(x - 30, y - 10);
            ctx.quadraticCurveTo(x - 35, y + 20, x - 25, y + 25);
            ctx.lineTo(x + 25, y + 25);
            ctx.quadraticCurveTo(x + 35, y + 20, x + 30, y - 10);
            ctx.closePath();
            ctx.fill();

            // Pot rim
            ctx.fillStyle = '#3A3A3A';
            ctx.beginPath();
            ctx.ellipse(x, y - 10, 32, 8, 0, 0, Math.PI * 2);
            ctx.fill();

            // Gold coins in pot
            if (potCoins > 0) {
                const coinGradient = ctx.createRadialGradient(x - 5, y - 20, 0, x, y - 15, 25);
                coinGradient.addColorStop(0, '#FFF8B0');
                coinGradient.addColorStop(0.5, '#FFD700');
                coinGradient.addColorStop(1, '#DAA520');

                ctx.fillStyle = coinGradient;
                ctx.beginPath();
                ctx.ellipse(x, y - 15, 25, Math.min(12, 5 + potCoins * 0.5), 0, 0, Math.PI * 2);
                ctx.fill();

                // Sparkle on coins
                if (frameCount % 20 < 10) {
                    ctx.fillStyle = 'rgba(255,255,255,0.8)';
                    ctx.beginPath();
                    ctx.arc(x + 8, y - 20, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // Coin counter
            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 14px Comic Sans MS, cursive';
            ctx.textAlign = 'center';
            ctx.fillText(potCoins, x, y + 40);
        }

        function drawBird() {
            ctx.save();
            ctx.translate(bird.x, bird.y);
            ctx.rotate(bird.rotation * Math.PI / 180);

            const size = CONFIG.BIRD_SIZE;

            // Bird shadow
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.beginPath();
            ctx.ellipse(3, 8, size * 0.8, size * 0.3, -0.2, 0, Math.PI * 2);
            ctx.fill();

            // Whole note body
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 3;
            ctx.fillStyle = 'white';

            ctx.beginPath();
            ctx.ellipse(0, 0, size, size * 0.65, -0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // Inner ellipse (whole note hole)
            ctx.fillStyle = '#98D8C8';
            ctx.beginPath();
            ctx.ellipse(0, 0, size * 0.5, size * 0.35, -0.4, 0, Math.PI * 2);
            ctx.fill();

            // Eye
            ctx.fillStyle = '#1a1a1a';
            ctx.beginPath();
            ctx.arc(size * 0.4, -size * 0.15, 4, 0, Math.PI * 2);
            ctx.fill();

            // Eye highlight
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(size * 0.45, -size * 0.2, 1.5, 0, Math.PI * 2);
            ctx.fill();

            // Beak
            ctx.fillStyle = '#FF8C00';
            ctx.beginPath();
            ctx.moveTo(size * 0.8, 0);
            ctx.lineTo(size * 1.3, 3);
            ctx.lineTo(size * 0.8, 6);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#CC6600';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Wing
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-size * 0.3, size * 0.2);
            ctx.quadraticCurveTo(-size * 0.5, size * 0.5, -size * 0.2, size * 0.4);
            ctx.stroke();

            ctx.restore();
        }

        function drawSparkles() {
            for (const s of sparkles) {
                ctx.save();
                ctx.globalAlpha = s.life;
                ctx.fillStyle = s.color;

                // Star shape
                ctx.beginPath();
                for (let i = 0; i < 4; i++) {
                    const angle = (Math.PI / 2) * i;
                    const x1 = s.x + Math.cos(angle) * s.size;
                    const y1 = s.y + Math.sin(angle) * s.size;
                    if (i === 0) ctx.moveTo(x1, y1);
                    else ctx.lineTo(x1, y1);

                    const x2 = s.x + Math.cos(angle + Math.PI/4) * s.size * 0.4;
                    const y2 = s.y + Math.sin(angle + Math.PI/4) * s.size * 0.4;
                    ctx.lineTo(x2, y2);
                }
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }

        function drawScorePopups() {
            for (const popup of scorePopups) {
                ctx.save();
                ctx.globalAlpha = popup.alpha;
                ctx.fillStyle = popup.color;
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 3;
                ctx.font = `bold ${16 * popup.scale}px Comic Sans MS, cursive`;
                ctx.textAlign = 'center';
                ctx.strokeText(popup.text, popup.x, popup.y);
                ctx.fillText(popup.text, popup.x, popup.y);
                ctx.restore();
            }
        }

        function drawWaitingScreen() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Fun title
            ctx.fillStyle = '#FFD700';
            ctx.strokeStyle = '#B8860B';
            ctx.lineWidth = 4;
            ctx.textAlign = 'center';
            ctx.font = 'bold 36px Comic Sans MS, cursive';
            ctx.strokeText('PITCH BIRD!', canvas.width / 2, canvas.height / 2 - 40);
            ctx.fillText('PITCH BIRD!', canvas.width / 2, canvas.height / 2 - 40);

            ctx.fillStyle = 'white';
            ctx.font = '18px Comic Sans MS, cursive';
            if (isAudioReady) {
                ctx.fillText('Tap to Start!', canvas.width / 2, canvas.height / 2 + 10);
            } else {
                ctx.fillText('Tap to Enable Mic!', canvas.width / 2, canvas.height / 2 + 10);
            }

            // Bouncing arrow
            const bounce = Math.sin(frameCount * 0.1) * 5;
            ctx.fillText('👆', canvas.width / 2, canvas.height / 2 + 50 + bounce);
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBackground();
            drawStaff();

            for (const coin of coins) drawCoin(coin);

            drawFlyingCoins();
            drawSparkles();
            drawBird();
            drawPotOfGold();
            drawScorePopups();

            if (gameState === 'waiting') drawWaitingScreen();
        }

        // =============================================================================
        // MAIN LOOP & EVENTS
        // =============================================================================

        function gameLoop() {
            updateGame();
            render();
            requestAnimationFrame(gameLoop);
        }

        function handleInteraction(e) {
            e.preventDefault();
            startGame();
        }

        canvas.addEventListener('click', handleInteraction);
        canvas.addEventListener('touchstart', handleInteraction);
        micStatus.addEventListener('click', () => { if (!isAudioReady) initAudio(); });
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault();
                startGame();
            }
        });

        resizeCanvas();
        gameLoop();
    </script>
</body>
</html>
